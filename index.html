<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NutriPath — AI Diet Planner</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <nav>
    <div class="logo">Nutri<span>Path</span></div>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/diet_plan">History</a></li>
    </ul>
  </nav>
  <section class="hero">
    <div class="hero-glow"></div>
    <h1>Your <em>Personalised</em><br>Diet Blueprint</h1>
    <p>Enter your stats and goal — get a science-backed meal plan in seconds.</p>
  </section>
  <section class="form-section">
    <div class="card">
      <div class="card-title">Tell us about yourself</div>
      <form action="/generate" method="POST">
        <div class="form-grid">
          <div class="form-group full">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="e.g. Priya Sharma" required />
          </div>
          <div class="form-group">
            <label for="age">Age (years)</label>
            <input type="number" id="age" name="age" min="10" max="100" placeholder="25" required />
          </div>
          <div class="form-group">
            <label for="gender">Gender</label>
            <select id="gender" name="gender">
              <option value="male">Male</option>
              <option value="female">Female</option>
            </select>
          </div>
          <div class="form-group">
            <label for="weight">Weight (kg)</label>
            <input type="number" id="weight" name="weight" min="20" max="300" step="0.1" placeholder="70" required />
          </div>
          <div class="form-group">
            <label for="height">Height (cm)</label>
            <input type="number" id="height" name="height" min="100" max="250" step="0.1" placeholder="170" required />
          </div>
          <div class="form-group full">
            <label>Activity Level</label>
            <select name="activity">
              <option value="sedentary">Sedentary — little or no exercise</option>
              <option value="light">Light — 1-3 days/week</option>
              <option value="moderate" selected>Moderate — 3-5 days/week</option>
              <option value="active">Active — 6-7 days/week</option>
              <option value="very_active">Very Active — intense daily training</option>
            </select>
          </div>
          <div class="form-group full">
            <label>Your Goal</label>
            <div class="goal-pills">
              <input type="radio" id="lose" name="goal" value="lose" />
              <label for="lose">Fire Lose Weight</label>
              <input type="radio" id="maintain" name="goal" value="maintain" checked />
              <label for="maintain">Balance Maintain Weight</label>
              <input type="radio" id="gain" name="goal" value="gain" />
              <label for="gain">Muscle Gain Muscle</label>
            </div>
          </div>
        </div>
        <div class="btn-row">
          <button type="submit" class="btn">Generate My Plan</button>
        </div>
      </form>
    </div>
  </section>
</body>
</html>
